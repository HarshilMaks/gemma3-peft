<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-8"><div class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden border">
<header class="bg-indigo-600 px-6 py-4 text-white"><h1 class="text-2xl font-bold">Team Project Tracker</h1></header>
<main class="p-6"><div class="space-y-4"><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Total Projects</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Active Projects</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Projects Overdue</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Total Tasks</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Completed Tasks</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Tasks Due Today</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Team Members Active</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Project List (Name, Status, Progress %, Due Date, Manager)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div></div>
</main></div></body></html>
